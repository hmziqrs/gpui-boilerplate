name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'CHANGELOG.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run docs:build

      - name: Deploy Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=gpui-starter --branch=master
